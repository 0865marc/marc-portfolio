daemon off;
error_log logs/error.log;
pid logs/nginx.pid;
events {}
http { include mime.types; access_log logs/access.log; server { listen 127.0.0.1:18088; root DIST_ROOT; index index.html; location /assets/ { try_files $uri =404; expires 1y; add_header Cache-Control "public, immutable"; } location ~ \.html$ { try_files $uri =404; add_header Cache-Control "no-cache"; } error_page 404 /404.html; location = /404.html { internal; add_header Cache-Control "no-cache"; } location / { try_files $uri $uri/ =404; } } }
