# Merge this exact location into the active HTTPS server block for portfolio.mybrawl.io.
# The receiver itself remains bound to localhost and /health is not exposed publicly.
location = /github-webhook-marc-portfolio {
    client_max_body_size 1m;
    proxy_pass http://127.0.0.1:9004/github-webhook-marc-portfolio;
    proxy_http_version 1.1;
    proxy_connect_timeout 2s;
    proxy_read_timeout 10s;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
}
