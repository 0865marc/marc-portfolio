server {
    listen 80;
    listen [::]:80;
    server_name portfolio.mybrawl.io;

    root /var/www/portfolio.mybrawl.io/current;
    index index.html;

    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location = /index.html {
        try_files $uri =404;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
